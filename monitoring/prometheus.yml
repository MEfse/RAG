global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "rag-api"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["rag-api:9000"]

  - job_name: "minilm"
    static_configs:
      - targets: ["minilm:8001"]

  - job_name: "marcominilm"
    static_configs:
      - targets: ["marcominilm:8010"]

  - job_name: "qwen"
    static_configs:
      - targets: ["qwen:8020"]